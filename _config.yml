title: Gneisswork
description: A free and open-source web application for field geological and sedimentological core logging
url: https://gneisswork.app
baseurl: ""

plugins:
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - .venv/
  - .archives/
  - .claude/
  - .dev/
  - .git/
  - .github/
  - .gitignore
  - .hypothesis/
  - .kiro/
  - .logs/
  - .pwlw-sedmob/
  - .pytest_cache/
  - .test/
  - .vscode/
  - instance/
  - p4a-recipes/
  - sedmob/
  - uploads/
  - .dockerignore
  - buildozer.spec
  - docker-compose.yml
  - Dockerfile
  - main.py
  - run.py
