name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libunwind-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libfreetype6-dev \
          libffi-dev \
          libssl-dev \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          libltdl-dev \
          pkg-config \
          cmake \
          ninja-build \
          openjdk-17-jdk
    
    - name: Set JAVA_HOME
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH
    
    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython==3.0.11
    
    - name: Cache Buildozer global directory
      uses: actions/cache@v5
      with:
        path: ~/.buildozer
        key: buildozer-global-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-global-
    
    - name: Cache Buildozer build directory
      uses: actions/cache@v5
      with:
        path: .buildozer
        key: buildozer-build-${{ hashFiles('buildozer.spec') }}-${{ hashFiles('**/*.py') }}
        restore-keys: |
          buildozer-build-${{ hashFiles('buildozer.spec') }}-
          buildozer-build-
    
    - name: Restore debug keystore
      if: env.DEBUG_KEYSTORE != ''
      env:
        DEBUG_KEYSTORE: ${{ secrets.DEBUG_KEYSTORE }}
      run: |
        mkdir -p ~/.android
        echo "$DEBUG_KEYSTORE" | base64 -d > ~/.android/debug.keystore

    - name: Patch p4a manifest for cleartext traffic
      run: |
        # Android 9+ (API 28) blocks cleartext HTTP by default. The app needs it
        # because Flask runs on http://127.0.0.1:5000 and the WebView loads it.
        # Buildozer's extra_manifest_application_arguments mangles quotes, so we
        # patch the p4a SDL2 manifest template directly before building.
        TMPL=$(python -c "import pythonforandroid; import os; print(os.path.join(os.path.dirname(pythonforandroid.__file__), 'bootstraps', 'sdl2', 'build', 'templates', 'AndroidManifest.tmpl.xml'))")
        if [ -f "$TMPL" ]; then
          sed -i 's|android:hardwareAccelerated="true"|android:hardwareAccelerated="true"\n                 android:usesCleartextTraffic="true"|' "$TMPL"
          echo "Patched: $TMPL"
        else
          echo "WARNING: Could not find AndroidManifest.tmpl.xml at $TMPL"
        fi

    - name: Build APK with Buildozer
      run: |
        yes | buildozer android debug 2>&1
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v5
      with:
        name: gneisswork-debug-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Determine version tag
      if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v')
      id: version
      run: |
        # Fetch all tags
        git fetch --tags
        # Find the latest v* tag, default to v0.0.0 if none exist
        LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1)
        if [ -z "$LATEST" ]; then
          LATEST="v0.0.0"
        fi
        # Extract major.minor.patch and bump patch
        VERSION="${LATEST#v}"
        MAJOR=$(echo "$VERSION" | cut -d. -f1)
        MINOR=$(echo "$VERSION" | cut -d. -f2)
        PATCH=$(echo "$VERSION" | cut -d. -f3)
        NEXT_PATCH=$((PATCH + 1))
        NEXT_TAG="v${MAJOR}.${MINOR}.${NEXT_PATCH}"
        echo "tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"
    
    - name: Create and push tag
      if: steps.version.outcome == 'success'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "${{ steps.version.outputs.tag }}"
        git push origin "${{ steps.version.outputs.tag }}"
    
    - name: Generate release notes
      if: github.event_name == 'push'
      id: notes
      run: |
        git fetch --tags

        # Find the previous tag
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -n1)
        else
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | sed -n '2p')
        fi

        if [ -z "$PREV_TAG" ]; then
          RANGE="HEAD"
        else
          RANGE="${PREV_TAG}..HEAD"
        fi

        # Generate categorized release notes
        python3 - "$RANGE" "${{ github.repository_owner }}" <<'PYEOF'
        import subprocess, sys, re, os

        commit_range = sys.argv[1]
        repo_owner = sys.argv[2] if len(sys.argv) > 2 else ""

        # Use record separator and group separator as delimiters
        SEP = "\x1f"
        COMMIT_END = "\x1e"
        fmt = f"%s{SEP}%b{SEP}%an{SEP}%ae{COMMIT_END}"
        cmd = ["git", "log", commit_range, f"--pretty=format:{fmt}", "--no-merges"]
        result = subprocess.run(cmd, capture_output=True, text=True)

        categories = {
            "features": ("🚀 New Features", []),
            "fixes": ("🐛 Bug Fixes", []),
            "docs": ("📖 Documentation", []),
            "tests": ("🧪 Testing", []),
            "chores": ("🔧 Maintenance", []),
            "other": ("Other Changes", []),
        }

        patterns = {
            "features": re.compile(r"^(feat|feature|add)[:(]", re.I),
            "fixes": re.compile(r"^(fix|bugfix|bug)[:(]", re.I),
            "docs": re.compile(r"^(docs?)[:(]", re.I),
            "tests": re.compile(r"^(tests?)[:(]", re.I),
            "chores": re.compile(r"^(chore|ci|build|refactor|style|perf)[:(]", re.I),
        }

        # Build set of owner identifiers to suppress attribution for
        owner_ids = {repo_owner.lower()}

        def is_owner_email(email):
            """Match GitHub noreply emails like 12345+user@users.noreply.github.com"""
            e = email.lower()
            return (
                e == f"{repo_owner.lower()}@users.noreply.github.com"
                or e.endswith(f"+{repo_owner.lower()}@users.noreply.github.com")
            )

        for chunk in result.stdout.strip().split(COMMIT_END):
            chunk = chunk.strip()
            if not chunk:
                continue
            parts = chunk.split(SEP)
            subject = parts[0].strip() if len(parts) > 0 else ""
            body = parts[1].strip().split("\n")[0].strip() if len(parts) > 1 else ""
            author = parts[2].strip() if len(parts) > 2 else ""
            email = parts[3].strip() if len(parts) > 3 else ""

            if not subject:
                continue

            # Only show author for external contributors
            is_owner = (
                author.lower() in owner_ids
                or is_owner_email(email)
                or author == "github-actions[bot]"
            )
            if author and not is_owner:
                entry = f"- {subject} (by {author})"
            else:
                entry = f"- {subject}"
            if body and body != subject:
                entry += f"\n  > {body}"

            matched = False
            for cat, pattern in patterns.items():
                if pattern.match(subject):
                    categories[cat][1].append(entry)
                    matched = True
                    break
            if not matched:
                categories["other"][1].append(entry)

        lines = []
        for key in ["features", "fixes", "docs", "tests", "chores", "other"]:
            title, entries = categories[key]
            if entries:
                lines.append(f"## {title}\n")
                lines.extend(entries)
                lines.append("")

        if not any(entries for _, entries in categories.values()):
            lines.append("## Changes\n")
            lines.append("- No notable changes")

        with open("/tmp/release_notes.md", "w") as f:
            f.write("\n".join(lines) + "\n")
        PYEOF

        echo "notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"
    
    - name: Create Release (auto version)
      if: steps.version.outcome == 'success'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        body_path: ${{ steps.notes.outputs.notes_file }}
        files: bin/*.apk
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create Release (manual tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        body_path: ${{ steps.notes.outputs.notes_file }}
        files: bin/*.apk
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
