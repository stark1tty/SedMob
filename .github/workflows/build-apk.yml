name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libunwind-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libfreetype6-dev \
          libffi-dev \
          libssl-dev \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          libltdl-dev \
          pkg-config \
          cmake \
          ninja-build \
          openjdk-17-jdk
    
    - name: Set JAVA_HOME
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
        echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH
    
    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython==3.0.11
    
    - name: Cache Buildozer global directory
      uses: actions/cache@v5
      with:
        path: ~/.buildozer
        key: buildozer-global-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-global-
    
    - name: Cache Buildozer build directory
      uses: actions/cache@v5
      with:
        path: .buildozer
        key: buildozer-build-${{ hashFiles('buildozer.spec') }}-${{ hashFiles('**/*.py') }}
        restore-keys: |
          buildozer-build-${{ hashFiles('buildozer.spec') }}-
          buildozer-build-
    
    - name: Build APK with Buildozer
      run: |
        yes | buildozer android debug 2>&1
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v5
      with:
        name: gneisswork-debug-apk
        path: bin/*.apk
        retention-days: 30
    
    - name: Determine version tag
      if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v')
      id: version
      run: |
        # Fetch all tags
        git fetch --tags
        # Find the latest v* tag, default to v0.0.0 if none exist
        LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1)
        if [ -z "$LATEST" ]; then
          LATEST="v0.0.0"
        fi
        # Extract major.minor.patch and bump patch
        VERSION="${LATEST#v}"
        MAJOR=$(echo "$VERSION" | cut -d. -f1)
        MINOR=$(echo "$VERSION" | cut -d. -f2)
        PATCH=$(echo "$VERSION" | cut -d. -f3)
        NEXT_PATCH=$((PATCH + 1))
        NEXT_TAG="v${MAJOR}.${MINOR}.${NEXT_PATCH}"
        echo "tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"
    
    - name: Create and push tag
      if: steps.version.outcome == 'success'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "${{ steps.version.outputs.tag }}"
        git push origin "${{ steps.version.outputs.tag }}"
    
    - name: Create Release (auto version)
      if: steps.version.outcome == 'success'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        files: bin/*.apk
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create Release (manual tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: bin/*.apk
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
